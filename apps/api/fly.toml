# fly.toml app configuration file generated for nestjs-template on 2026-01-08T18:13:35+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nestjs-template'
primary_region = 'syd'

[env]
  NODE_ENV = "development"

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
